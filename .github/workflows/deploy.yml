name: Deploy

on:
  push:
    branches: [main, test-branch]

jobs:
  call-lint:
    uses: ./.github/workflows/lint.yml

  call-tests:
    uses: ./.github/workflows/gotest.yml
    secrets: inherit
    needs: call-lint

  docker-build:
    runs-on: ubuntu-latest
    needs: call-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy with Docker
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            # Установка Docker Compose на сервере (если нет)
            if ! command -v docker compose &> /dev/null; then
              echo "Установка Docker Compose..."
              sudo apt-get update
              sudo apt-get install docker-compose-plugin -y
            fi
          
            cd ${{ secrets.DEPLOY_DIR }}
            git pull
          
            # Остановка старых контейнеров
            docker compose down || docker-compose down
          
            # Сборка и запуск
            docker compose build || docker-compose build
            docker compose up -d || docker-compose up -d
          
            # Ожидание запуска контейнера
            sleep 10
          
            # Выполнение миграций
            docker compose exec -T backend python manage.py migrate || docker-compose exec -T backend python manage.py migrate
          
            # Сбор статики
            docker compose exec -T backend python manage.py collectstatic --noinput || docker-compose exec -T backend python manage.py collectstatic --noinput
          
            # Очистка старых образов
            docker system prune -f
          EOF