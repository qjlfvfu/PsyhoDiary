name: Lint
on:
  push:
    branches: [main,test-branch]
  pull_request:
    branches: [main]
  workflow_call: # 👈 этот workflow можно вызывать из других

jobs:
    lint:
      runs-on: ubuntu-latest

      steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Flake8
        run: flake8 .